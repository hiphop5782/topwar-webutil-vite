name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Restore Puppeteer browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            puppeteer-${{ runner.os }}-

      - name: Create .env.production file
        shell: bash
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          printf '%s' "$ENV_PRODUCTION" > .env.production

      - name: Install dependencies
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: npm ci

      - name: Build and prerender project
        env:
          CI: false
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: npm run build

      - name: Verify prerendered pages
        shell: bash
        run: |
          set -euo pipefail

          echo "=== 기본 프리렌더 페이지 확인 ==="

          test -f dist/index.html
          test -f dist/ko/index.html
          test -f dist/en/index.html
          test -f dist/ja/index.html

          echo "=== 정책 페이지 파일 확인 ==="

          for lang in ko en ja
          do
            test -f "dist/$lang/privacy/index.html"
            test -f "dist/$lang/contact/index.html"
            test -f "dist/$lang/disclaimer/index.html"
          done

          echo "=== 생성된 정책 페이지 목록 ==="

          find dist \
            -type f \
            \( \
              -path "*/privacy/index.html" \
              -o -path "*/contact/index.html" \
              -o -path "*/disclaimer/index.html" \
            \) \
            -print

          echo "=== 정적 본문 포함 여부 확인 ==="

          grep -q "개인정보처리방침" \
            dist/ko/privacy/index.html

          grep -q "문의" \
            dist/ko/contact/index.html

          grep -q "면책" \
            dist/ko/disclaimer/index.html

          grep -q '<div id="root"><div' \
            dist/ko/privacy/index.html

          grep -q '<div id="root"><div' \
            dist/ko/contact/index.html

          grep -q '<div id="root"><div' \
            dist/ko/disclaimer/index.html

          echo "=== 번역 키 잔존 여부 확인 ==="

          if grep -R -E \
            'Privacy\.|Contact\.|Disclaimer\.' \
            dist/ko/privacy \
            dist/ko/contact \
            dist/ko/disclaimer
          then
            echo "정책 페이지에 번역되지 않은 키가 남아 있습니다."
            exit 1
          fi

          echo "모든 프리렌더 결과 검증 완료"

      - name: Create nojekyll file
        shell: bash
        run: touch dist/.nojekyll

      - name: Force deployment update
        shell: bash
        run: |
          echo "<!-- force redeploy $(date -u) -->" >> dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          cname: www.progamer.info
          force_orphan: true